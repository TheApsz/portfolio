<body>
    <div id="background" class="login">
        <img alt="background" src="SRC/images/wallpaper.png">
    </div>

    <div id="startup" class="debugOff">
        <div class="startupText">
            <img alt="logo" src="SRC/images/logo.svg">
            <h1>LUMEN</h1>
        </div>
        <div class="startupDecoration">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>
    <div id="login" class="trans-med active">
        <div class="loginMain">
            <div class="loginClock">
                <h1 class="time">00:00</h1>
                <h2 class="date">Sunday, June 14</h2>
            </div>

            <div class="loginList">
                <h2 class="loginWatermark">LUMEN</h2>

                <div class="loginSelect">
                    <h3>Select user</h3>

                    <div class="card button active">
                        <div class="cardImage">
                            <img alt="user profile" class="user" src="SRC/images/apsz.webp">
                        </div>
                        <div class="cardDetail">
                            <h1>Apsz</h1>
                            <h2>Administrator</h2>
                        </div>
                    </div>
                    <div class="card button">
                        <div class="cardImage">
                            <img alt="user profile" src="SRC/images/user.svg">
                        </div>
                        <div class="cardDetail">
                            <h1>Guest</h1>
                            <h2>limited access</h2>
                        </div>
                    </div>
                </div>
            </div>
            <div class="loginList">
                <h2 class="loginRemind">Password for <span class="loginSelectedUser">Apsz</span></h2>
                <div class="loginType">
                    <h3 class="loginTypePassword">Enter password here :3</h3>
                    <input class="loginTypeBack" type="text" maxlength="888">
                </div>

                <div class="loginProceed button">
                    <h3>Unlock</h3>
                </div>

                <div class="loginFlex">
                    <h2 class="loginFlexCaps">Caps lock off</h2>
                    <div class="loginFlexFlex">
                        <div class="button">
                            <img alt="button" src="SRC/images/restart.svg">
                        </div>
                        <div class="button">
                            <img alt="button" src="SRC/images/shutdown.svg">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap');
:root {
       /* Backgrounds */
       --bg: rgb(11, 11, 13);
       --bg2: rgba(16, 16, 18, 1);
       --bgtrans: rgba(0, 0, 0, 0.2);
       --bgtrans2: rgba(255, 255, 255, 0.1);

       /* Text */
       --txt: rgb(236, 241, 233);

       /* Colors */
       --primary: 255, 20, 20;
       --secondary: 255, 200, 100;
       --pri: rgb(var(--primary));
       --pri2: rgba(var(--primary), 0.1);
       --sec: rgb(var(--secondary));
       --sec2: rgba(var(--secondary), 0.1);

       /* Some important stuff */
       --header-width: auto;
}
* {
    border-radius: 15px;
    font-family: "space grotesk", sans-serif !important;
}
html {
    overflow: hidden;
}
.debugOff {
    display: none !important;
}
</style>

<script>
function lGet(key) {
    var val = localStorage.getItem(key);
    return val ? JSON.parse(val) : null;
}
function lSet(key, val) {
    localStorage.setItem(key, JSON.stringify(val));
}
</script>
