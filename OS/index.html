<body
    data-firsttime="True"

    >
    <div id="main">
        <div class="tutorial">
            <div class="card">
                <h1>Welcome to <span class="highlight">Lumen</span></h1>
                <h2>Web based operating system. Need a tutorial?</h2>
                <div class="choice">
                    <div class="button">
                        <h3>Yes please</h3>
                    </div>
                    <div class="button">
                        <h3>Ew what the hell?</h3>
                    </div>
                </div>
            </div>
            <div class="card">
                <h2>Bellow this text we have your monitor (that big black box)</h2>
                <div class="choice">
                    <div class="button">
                        <h3>mhm..</h3>
                    </div>
                </div>
            </div>
            <div class="card">
                <h2>Imagine this as your actual physical desktop or a laptop</h2>
                <div class="choice">
                    <div class="button">
                        <h3>okie</h3>
                    </div>
                </div>
            </div>
            <div class="card active">
                <h2>First we will enter the physical mode by pressing:</h2>
                <div class="choice">
                    <div class="highlight keyMod_Shift">
                        <h3>Shift</h3>
                    </div>
                    <h2>+</h2>
                    <div class="highlight keyMod_Escape">
                        <h3>Esc</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
function lGet(key) {
    var val = localStorage.getItem(key);
    return val ? JSON.parse(val) : null;
}
function lSet(key, val) {
    localStorage.setItem(key, JSON.stringify(val));
}
</script>
