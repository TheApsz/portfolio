<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faustas - J. W. Goethe</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #c2c2c2;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.09);
    --border-active: rgba(200,180,255,0.4);
    --text-primary: rgba(255,255,255,0.92);
    --text-secondary: rgba(255,255,255,0.45);
    --text-muted: rgba(255,255,255,0.22);
    --accent: #b8a0f8;
    --accent-dim: rgba(184,160,248,0.15);
    --gold: #d4a94a;
    --gold-dim: rgba(212,169,74,0.12);
    --teal: #5ecfb0;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  canvas#bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 24px;
  }

  /* -- SLIDE CARD -- */
  #slide-card {
    width: 100%;
    max-width: 760px;
    min-height: 400px;
    background: rgba(13,13,20,0.72);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    padding: 48px 52px 40px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: opacity 0.25s ease;
  }

  #slide-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-dim), var(--border-active), var(--accent-dim), transparent);
  }

  .slide-tag {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  .slide-num {
    position: absolute;
    top: 40px; right: 48px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .slide-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    line-height: 1.15;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .slide-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    color: var(--gold);
    font-weight: 300;
  }

  .slide-divider {
    width: 40px;
    height: 1px;
    background: var(--border-active);
    opacity: 0.5;
    margin: 4px 0;
  }

  .slide-body {
    font-size: 13px;
    line-height: 1.8;
    color: rgba(255,255,255,0.68);
    font-weight: 300;
  }

  .slide-body ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .slide-body ul li {
    padding-left: 18px;
    position: relative;
  }

  .slide-body ul li::before {
    content: '·';
    position: absolute;
    left: 4px;
    color: var(--accent);
    font-size: 16px;
    line-height: 1.5;
  }

  .slide-body .name { color: var(--accent); }
  .slide-body .name-gold { color: var(--gold); }
  .slide-body .name-teal { color: var(--teal); }

  .slide-body blockquote {
    border-left: 2px solid var(--accent-dim);
    padding: 10px 16px;
    background: rgba(184,160,248,0.04);
    border-radius: 0 8px 8px 0;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    color: rgba(255,255,255,0.6);
    margin: 8px 0;
  }

  /* fade transition */
  #slide-card.fading { opacity: 0; transform: translateY(6px); }
  #slide-card { transition: opacity 0.2s ease, transform 0.2s ease; }

  /* -- ISLAND PANEL -- */
  #island {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid var(--border);
    border-radius: 999px;
    padding: 8px 14px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 0.5px rgba(255,255,255,0.04);
    max-width: 760px;
    width: 100%;
    overflow: hidden;
  }

  #island-dots {
    display: flex;
    gap: 5px;
    flex: 1;
    flex-wrap: wrap;
    align-items: center;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  .dot:hover { background: var(--text-secondary); transform: scale(1.3); }
  .dot.active { background: var(--accent); transform: scale(1.2); }

  .island-sep {
    width: 1px;
    height: 22px;
    background: var(--border);
    flex-shrink: 0;
  }

  .island-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: 999px;
    color: var(--text-secondary);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    padding: 5px 14px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .island-btn:hover {
    background: var(--surface-hover);
    color: var(--text-primary);
    border-color: var(--border-active);
  }
  .island-btn:active { transform: scale(0.97); }

  #island-counter {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 36px;
    text-align: center;
  }

  /* keyboard hint */
  #hint {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div id="app">
  <div id="slide-card">
    <span class="slide-tag" id="s-tag">Įvadas</span>
    <span class="slide-num" id="s-num">01 / 13</span>
    <h1 class="slide-title" id="s-title">Johanas Volfgangas fon Gėtė</h1>
    <div class="slide-subtitle" id="s-sub">„Faustas" - epochos šedevras</div>
    <div class="slide-divider"></div>
    <div class="slide-body" id="s-body"></div>
  </div>

  <div id="island">
    <button class="island-btn" id="btn-prev">← atgal</button>
    <div class="island-sep"></div>
    <div id="island-dots"></div>
    <div class="island-sep"></div>
    <span id="island-counter">1 / 13</span>
    <div class="island-sep"></div>
    <button class="island-btn" id="btn-next">pirmyn →</button>
  </div>

  <span id="hint">← → klavišai arba mygtukai</span>
</div>

<script>
$(function() {

  // -- CANVAS BACKGROUND --
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], stars = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 0.9 + 0.2,
        a: Math.random(),
        speed: Math.random() * 0.003 + 0.001,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function initParticles() {
    particles = [];
    for (let i = 0; i < 18; i++) {
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 120 + 40,
        dx: (Math.random() - 0.5) * 0.18,
        dy: (Math.random() - 0.5) * 0.12,
        hue: Math.random() > 0.5 ? 265 : 45,
        a: Math.random() * 0.06 + 0.02
      });
    }
  }

  let t = 0;
  function draw() {
    t += 0.016;
    ctx.clearRect(0, 0, W, H);

    ctx.fillStyle = '#0d0d12';
    ctx.fillRect(0, 0, W, H);

    particles.forEach(p => {
      p.x += p.dx;
      p.y += p.dy;
      if (p.x < -p.r) p.x = W + p.r;
      if (p.x > W + p.r) p.x = -p.r;
      if (p.y < -p.r) p.y = H + p.r;
      if (p.y > H + p.r) p.y = -p.r;

      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      grad.addColorStop(0, `hsla(${p.hue},60%,55%,${p.a})`);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });

    stars.forEach(s => {
      const alpha = s.a * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });

    const scanY = (t * 40) % (H + 4) - 2;
    ctx.strokeStyle = 'rgba(184,160,248,0.04)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, scanY);
    ctx.lineTo(W, scanY);
    ctx.stroke();

    requestAnimationFrame(draw);
  }

  resize();
  initStars();
  initParticles();
  draw();
  $(window).on('resize', function() { resize(); initStars(); initParticles(); });

  // -- SLIDES DATA --
  const slides = [
    {
      tag: 'Įvadas', title: 'Johanas Volfgangas fon Gėtė',
      sub: '„Faustas" - epochos šedevras',
      body: `<ul>
        <li>1749-1832 m. - vokiečių poetas, dramaturgas, mokslininkas</li>
        <li>Vienas didžiausių Vokietijos literatūros genijų</li>
        <li>„Faustas" - jo svarbiausias ir ilgiausias kūrinys</li>
        <li>Kūrinys rašytas daugiau nei 60 metų</li>
      </ul>`
    },
    {
      tag: 'Kūrybos istorija', title: 'Kaip gimė „Faustas"?',
      sub: '60 metų kūrybos kelias',
      body: `<ul>
        <li>Pirmosios idėjos - apie 1772 m. (Gėtei 23 metai)</li>
        <li>„Pradinė Fausto forma" (Urfaust) - 1772-1775 m.</li>
        <li>„Faustas. Fragmentas" - 1790 m.</li>
        <li>„Faustas I" - 1808 m.</li>
        <li>„Faustas II" - 1832 m., leidžiamas po mirties</li>
      </ul>`
    },
    {
      tag: 'Šaltiniai', title: 'Istorinis Fausto mitas',
      sub: 'Legendos šaknys',
      body: `<ul>
        <li>Istorinis Johannas von Gėtė Faustas - XVI a. vokiečių alchemikas</li>
        <li>Pirmoji knyga apie Faustą - 1587 m. (Historia von D. Johann Fausten)</li>
        <li>Christopherio Marlowe'o drama „Daktaras Faustas" - 1592 m.</li>
        <li>Liaudies teatrų tradicija Vokietijoje</li>
        <li>Gėtė šią legendą pakylėjo į filosofinę aukštumą</li>
      </ul>`
    },
    {
      tag: 'Siužetas I', title: 'Pirmosios dalies turinys',
      sub: 'Sutartis su velniu',
      body: `<ul>
        <li>Faustas - mokslininkas, nusivylęs žmogaus žinių ribomis</li>
        <li>Mefistofelis pasirodo kaip juodas šuo, vėliau - kaip ponas</li>
        <li>Sutartis: Mefistofelis tarnauja, kol Faustas pasakys „O, stabtelėk, akimirksni žavingas"</li>
        <li>Faustas atjaunėja ir įsimyli Margaritą (Gretchen)</li>
        <li>Tragiška Gretchen istorija - kalėjimas ir mirtis</li>
      </ul>`
    },
    {
      tag: 'Siužetas II', title: 'Antrosios dalies turinys',
      sub: 'Pasaulio scenoje',
      body: `<ul>
        <li>Faustas pabunda gamtoje - atgimimas ir išgydymas</li>
        <li>Imperatoriaus dvare - Faustas sutinka Helenę iš Trojos</li>
        <li>Simbolinė santuoka su antikos grožiu</li>
        <li>Faustas siekia žmonių gerovės - sausinama jūros pakrantė</li>
        <li>Fausto mirtis ir išganymas Dievo malonės dėka</li>
      </ul>`
    },
    {
      tag: 'Personažai', title: 'Pagrindiniai veikėjai',
      sub: 'Kas yra kas?',
      body: `<ul>
        <li><span class="name">Faustas</span> - mokslininkas, amžinas ieškotojas, simbolizuoja žmoniją</li>
        <li><span class="name-teal">Mefistofelis</span> - velnias, ironiškas ir gudrus</li>
        <li><span class="name-gold">Margaretė (Gretchen)</span> - naivi, tyra mergina, tragiška aukos figūra</li>
        <li><span class="name">Helenė</span> - antikos grožio įsikūnijimas (II dalis)</li>
        <li>Viešpats - prologe lažinasi su Mefistofeliu dėl Fausto sielos</li>
      </ul>`
    },
    {
      tag: 'Filosofija', title: 'Pagrindinės idėjos',
      sub: 'Kuo svarbus šis kūrinys?',
      body: `<ul>
        <li>Žmogaus pažinimo troškimas ir jo ribos</li>
        <li>Gėris ir blogis - neatsiejamos pasaulio dalys</li>
        <li>Mefistofelio paradoksas - jėga, kuri nori blogio ir daro gėrį</li>
        <li>Žmogus turi klaidžioti, kad augtų</li>
        <li>Išganymas per meilę ir pastangas</li>
      </ul>`
    },
    {
      tag: 'Simbolika', title: 'Svarbiausi simboliai',
      sub: 'Gilesnė prasmė',
      body: `<ul>
        <li>Sutartis krauju - sielos ir kūno konfliktas</li>
        <li>Juodas šuo - velnio pasirodymo forma, paslėpta blogybė</li>
        <li>Amžinoji moters figūra - išganymo simbolis</li>
        <li>Homunkulas - dirbtinio kūrimo svajonė, proto ribos</li>
        <li>Jūros sausinimas - žmogaus pergalė prieš gamtą</li>
      </ul>`
    },
    {
      tag: 'Stilius', title: 'Literatūrinė forma',
      sub: 'Kaip tai parašyta?',
      body: `<ul>
        <li>Mišri forma: drama, lyrika, epas</li>
        <li>Skirtingi metrai: madrigalinis eilėraštis, sonetai, Knittelvers</li>
        <li>Prologas danguje - barokinė tradicija</li>
        <li>Valpurgijos naktis - folkloro elementai</li>
        <li>Antikos ir krikščionybės pasaulių susiliejimas</li>
      </ul>`
    },
    {
      tag: 'Epocha', title: 'Romantizmas ir „Sturm und Drang"',
      sub: 'Istorinis kontekstas',
      body: `<ul>
        <li>„Audra ir veržimasis" - XVIII a. vokiečių literatūros judėjimas</li>
        <li>Jausmų, gamtos ir individualybės kultas</li>
        <li>Reakcija prieš Apšvietos racionalizmą</li>
        <li>Gėtė vėliau tapo klasicizmo atstovu</li>
        <li>„Faustas" apima abu laikotarpius - tiltas tarp epochų</li>
      </ul>`
    },
    {
      tag: 'Įtaka', title: 'Kūrinio reikšmė pasaulio kultūrai',
      sub: 'Kodėl tai svarbu iki šiandien?',
      body: `<ul>
        <li>Berliozas, Lisztas, Gounod, Mahleris - muzikos kūriniai pagal Faustą</li>
        <li>Daugybė teatrinių adaptacijų visame pasaulyje</li>
        <li>„Faustiško sandorio" sąvoka - kultūros dalis</li>
        <li>Įtaka Nietzsche'i, Manui, Bulgakovui</li>
        <li>Filmai, operos, baletai - iki XXI a.</li>
      </ul>`
    },
    {
      tag: 'Citata', title: 'Žymiausia citata',
      sub: 'Faustas, I dalis',
      body: `<blockquote>„Dvi sielos, deja, gyvena mano krūtinėje" <br><small style="font-size:13px;font-style:normal;color:rgba(255,255,255,0.3)">(„Zwei Seelen wohnen, ach! in meiner Brust")</small></blockquote>
      <ul>
        <li>Išreiškia vidinį žmogaus dvilypumą</li>
        <li>Dvasinė ir juslinė prigimtys kovoja</li>
        <li>Tapusi vienu žymiausių literatūros aforizmų</li>
      </ul>`
    },
    {
      tag: 'Išvados', title: 'Kodėl skaityti „Faustą"?',
      sub: 'Pabaiga',
      body: `<ul>
        <li>Universalus klausimas: ko verta žmogaus siela?</li>
        <li>Kūrinys, aprėpiantis visą žmogaus patirtį</li>
        <li>Gėtė sukūrė naują tipą - amžiną ieškotoją</li>
        <li>„Faustas" - ne tik drama, bet ir gyvenimo filosofija</li>
      </ul>
      <blockquote>„Kas visad siekia aukštyn ir veržiasi, tą mes galim išgelbėt."<br><small style="font-size:12px;font-style:normal;color:rgba(255,255,255,0.3)">- Viešpats, II dalis</small></blockquote>`
    }
  ];

  let current = 0;
  const total = slides.length;

  $.each(slides, function(i) {
    const $dot = $('<button class="dot">').attr('aria-label', 'Skaidrė ' + (i+1));
    $dot.on('click', function() { goTo(i); });
    $('#island-dots').append($dot);
  });

  function updateDots() {
    $('#island-dots .dot').removeClass('active').eq(current).addClass('active');
  }

  function goTo(idx, dir) {
    if (idx === current) return;
    current = idx;
    const s = slides[current];

    $('#slide-card').addClass('fading');

    setTimeout(function() {
      $('#s-tag').text(s.tag);
      $('#s-num').text(String(current+1).padStart(2,'0') + ' / ' + total);
      $('#s-title').text(s.title);
      $('#s-sub').text(s.sub);
      $('#s-body').html(s.body);
      $('#island-counter').text((current+1) + ' / ' + total);
      updateDots();
      $('#slide-card').removeClass('fading');
    }, 200);
  }

  function next() { goTo(current < total-1 ? current+1 : current); }
  function prev() { goTo(current > 0 ? current-1 : current); }

  $('#btn-next').on('click', next);
  $('#btn-prev').on('click', prev);

  $(document).on('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prev();
  });

  const s0 = slides[0];
  $('#s-body').html(s0.body);
  $('#island-counter').text('1 / ' + total);
  updateDots();
});
</script>
</body>
</html>
